<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SplitEasy</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000; font-family:'Inter',sans-serif; overflow: hidden;}
  
  /* BACKGROUND (Locked) */
  canvas#smoke{position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; z-index:1;}
  .overlay{position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); pointer-events:none; z-index:2;}
  
  #app-container{position:relative; z-index:10; height:100vh; width:100vw; overflow-y:auto; overflow-x:hidden;}

  /* LANDING PAGE STYLES (UNTOUCHED) */
  .landing-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
  .headline{font-size:clamp(32px,7vw,60px);font-weight:900;color:#fff;line-height:1.08;letter-spacing:-.02em;margin-bottom:1rem}
  .headline .grad{background:linear-gradient(100deg,#a78bfa,#f0abfc,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{font-size:clamp(15px,2.5vw,19px);color:rgba(255,255,255,.55);max-width:380px;line-height:1.65;font-weight:300;margin-bottom:2.2rem}
  .glow-btn{position:relative;padding:15px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#7c3aed,#a855f7,#06b6d4);color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.03em;box-shadow:0 0 28px rgba(124,58,237,.55),0 0 56px rgba(124,58,237,.2);transition:transform .2s,box-shadow .2s;}
  .glow-btn:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 0 40px rgba(124,58,237,.8),0 0 80px rgba(124,58,237,.3)}
  .glow-btn:active{transform:scale(.97)}

  /* PREMIUM BENTO-BOX UI */
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  
  .bg-grid {
    background-size: 30px 30px;
    background-image: 
      linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  }

  .bento-cell {
    background: rgba(15, 15, 20, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    border-radius: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Focus glows */
  .premium-input { background: transparent; border: none; outline: none; width: 100%; transition: all 0.3s; }
  .premium-input::placeholder { color: rgba(255,255,255,0.15); }

  /* Animations */
  @keyframes fadeUpIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .animate-bento { animation: fadeUpIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
  
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }
  .animate-receipt { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  /* Custom Scrollbar */
  .custom-scroll::-webkit-scrollbar { width: 4px; }
  .custom-scroll::-webkit-scrollbar-track { background: transparent; }
  .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
</style>
</head>
<body>

<canvas id="smoke"></canvas>
<div class="overlay"></div>
<div id="root"></div>

<script>
  // --- BACKGROUND ENGINE (Untouched) ---
  const FRAG=`#version 300 es
  precision highp float; out vec4 O; uniform float time; uniform vec2 resolution; uniform vec3 u_color;
  #define FC gl_FragCoord.xy
  #define R resolution
  #define T (time+660.)
  float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}
  float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);return mix(mix(rnd(i),rnd(i+vec2(1,0)),u.x),mix(rnd(i+vec2(0,1)),rnd(i+1.),u.x),u.y);}
  float fbm(vec2 p){float t=.0,a=1.;for(int i=0;i<5;i++){t+=a*noise(p);p*=mat2(1,-1.2,.2,1.2)*2.;a*=.5;}return t;}
  void main(){
    vec2 uv=(FC-.5*R)/R.y;vec3 col=vec3(1); uv.x+=.25;uv*=vec2(2,1);
    float n=fbm(uv*.28-vec2(T*.01,0));n=noise(uv*3.+n*2.);
    col.r-=fbm(uv+vec2(0,T*.015)+n); col.g-=fbm(uv*1.003+vec2(0,T*.015)+n+.003); col.b-=fbm(uv*1.006+vec2(0,T*.015)+n+.006);
    col=mix(col,u_color,dot(col,vec3(.21,.71,.07))); col=mix(vec3(.08),col,min(time*.1,1.)); col=clamp(col,.08,1.); O=vec4(col,1);
  }`;
  const VERT=`#version 300 es\nprecision highp float;\nin vec4 position;\nvoid main(){gl_Position=position;}`;
  const cv=document.getElementById('smoke'); const gl=cv.getContext('webgl2');
  let prog, smokeColor=[0.48,0.23,0.93];
  window.setSmokeColor = (r, g, b) => { smokeColor = [r, g, b]; };
  function mkS(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
  (function initGL(){
    const vs=mkS(gl.VERTEX_SHADER,VERT),fs=mkS(gl.FRAGMENT_SHADER,FRAG);
    prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,1,-1,-1,1,1,1,-1]),gl.STATIC_DRAW);
    const pos=gl.getAttribLocation(prog,'position');gl.enableVertexAttribArray(pos);gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
    prog.res=gl.getUniformLocation(prog,'resolution');prog.time=gl.getUniformLocation(prog,'time');prog.col=gl.getUniformLocation(prog,'u_color');
  })();
  function resize(){const dpr=Math.max(1,devicePixelRatio);cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;gl.viewport(0,0,cv.width,cv.height);}
  resize();window.addEventListener('resize',resize);
  (function loop(now){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.uniform2f(prog.res,cv.width,cv.height);gl.uniform1f(prog.time,now*.001);gl.uniform3fv(prog.col,smokeColor);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(loop);})(0);
</script>
<script>
  Babel.registerPreset('react-classic', {
    presets: [
      [Babel.availablePresets['react'], { runtime: 'classic' }]
    ]
  });
</script>
<script type="text/babel" data-presets="react-classic">
  const { useState, useEffect } = React;

  // Modern SVG Icons
  const HistoryIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
  const UsersIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
  const SlidersIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>;
  const ShareIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;

  const App = () => {
    const [page, setPage] = useState('landing');
    
    // Core State
    const [bill, setBill] = useState('');
    const [tip, setTip] = useState(0);
    const [customTipStr, setCustomTipStr] = useState(''); // Handles custom tip input
    const [mode, setMode] = useState('equal');
    const [people, setPeople] = useState([
      { id: 1, name: 'You', amount: '' }, 
      { id: 2, name: 'Friend', amount: '' }
    ]);

    // UI Overlays
    const [calculatedResult, setCalculatedResult] = useState(null);
    const [showHistory, setShowHistory] = useState(false);
    const [history, setHistory] = useState([]);

    // Clear result if inputs change
    useEffect(() => { setCalculatedResult(null); }, [bill, tip, mode, people]);

    // Math (Strictly Whole Numbers/Rupees)
    const bAmount = Math.round(Number(bill)) || 0;
    const grandTotal = bAmount + tip;
    const unequalAssigned = Math.round(people.reduce((sum, p) => sum + (Number(p.amount) || 0), 0));

    // Handlers
    const goToMain = () => { setPage('main'); window.setSmokeColor(0.20, 0.10, 0.60); };
    const goToLanding = () => { setPage('landing'); window.setSmokeColor(0.48, 0.23, 0.93); };

    const addPerson = () => setPeople([...people, { id: Date.now(), name: '', amount: '' }]);
    const removePerson = (id) => setPeople(people.filter(p => p.id !== id));

    const handleCalculate = () => {
      if (bAmount === 0) return;

      let finalSplit = [];
      let isError = false;

      if (mode === 'equal') {
        const share = Math.round(grandTotal / people.length);
        finalSplit = people.map(p => ({ ...p, finalShare: share }));
      } else {
        if (unequalAssigned !== grandTotal) {
          isError = true;
          alert(`Check amounts! You assigned ₹${unequalAssigned}, but the total is ₹${grandTotal}.`);
        } else {
          finalSplit = people.map(p => ({ ...p, finalShare: Math.round(Number(p.amount) || 0) }));
        }
      }

      if (isError) return;

      const resultObj = {
        id: Date.now(),
        date: new Date().toLocaleDateString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
        grandTotal,
        mode,
        split: finalSplit
      };

      setCalculatedResult(resultObj);
      setHistory([resultObj, ...history]);
    };

    const handleShare = async () => {
      if (!calculatedResult) return;
      
      const text = `🧾 SplitEasy Summary\n\nTotal Bill: ₹${calculatedResult.grandTotal}\n\nBreakdown:\n${calculatedResult.split.map(p => `${p.name || 'Person'}: ₹${p.finalShare}`).join('\n')}\n\nPay up! 💸`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'SplitEasy Bill Summary',
            text: text,
          });
        } catch (err) {
          console.log('Share failed or was cancelled');
        }
      } else {
        navigator.clipboard.writeText(text);
        alert("Summary copied to clipboard! You can now paste it in WhatsApp.");
      }
    };

    // === PAGE 1: LANDING ===
    if (page === 'landing') {
      return (
        <div id="app-container">
          <div className="landing-inner">
            <h1 className="headline">Split<br/><span className="grad">Easy</span></h1>
            <p className="sub">Split expenses in seconds.<br/>Fair, fast, and professional.</p>
            <button className="glow-btn" onClick={goToMain}>Get Started &rarr;</button>
          </div>
        </div>
      );
    }

    // === PAGE 2: MAIN DASHBOARD ===
    return (
      <div id="app-container" className="flex flex-col items-center">
        
        {/* Top Navbar */}
        <div className="w-full max-w-5xl flex justify-between items-center p-6 relative z-10">
          <button onClick={goToLanding} className="group flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-[0.2em]">
            <span className="w-6 h-[1px] bg-slate-500 group-hover:bg-white transition-colors"></span> Exit System
          </button>
          <button onClick={() => setShowHistory(true)} className="flex items-center gap-2 text-xs font-bold text-purple-400 hover:text-white bg-purple-500/10 px-4 py-2 rounded-full border border-purple-500/20 transition-colors uppercase tracking-widest">
            <HistoryIcon /> History
          </button>
        </div>

        {/* MAIN BENTO GRID & BUTTON WRAPPER */}
        <div className="w-full max-w-5xl px-6 pb-20 relative z-10 flex flex-col gap-5">
          
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
            {/* LEFT COLUMN (Total & Tip) */}
            <div className="lg:col-span-5 flex flex-col gap-5">
              
              {/* CELL 1: TOTAL BILL */}
              <div className="bento-cell bg-grid p-8 animate-bento" style={{ animationDelay: '0.1s' }}>
                <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-purple-500 to-transparent"></div>
                <div className="flex justify-between items-center mb-6">
                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Total Bill</span>
                </div>
                
                <div className="flex items-end gap-2 border-b border-white/10 pb-4">
                  <span className="text-4xl font-light text-purple-500 mb-1">₹</span>
                  <input 
                    type="number" 
                    value={bill}
                    onChange={(e) => setBill(e.target.value)}
                    placeholder="0"
                    className="premium-input text-6xl font-black text-white tracking-tighter"
                  />
                </div>
              </div>

              {/* CELL 2: TIP WITH CUSTOM INPUT */}
              <div className="bento-cell p-6 animate-bento" style={{ animationDelay: '0.2s' }}>
                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Tip</div>
                <div className="grid grid-cols-3 gap-3">
                  {[0, 100, 200, 300, 500].map((amt) => (
                    <button 
                      key={amt}
                      onClick={() => {
                        setTip(amt);
                        setCustomTipStr(''); // Clear custom input when a preset is clicked
                      }}
                      className={`py-3 rounded-xl text-xs font-bold font-mono transition-all duration-300 ${tip === amt && customTipStr === '' ? 'bg-purple-600 text-white shadow-[0_0_15px_rgba(168,85,247,0.5)] border border-purple-400' : 'bg-black/50 text-slate-400 hover:text-white border border-white/5 hover:border-white/20'}`}
                    >
                      {amt === 0 ? '₹0' : `+₹${amt}`}
                    </button>
                  ))}
                  
                  {/* Custom Tip Input (Replaces the 6th slot in the grid perfectly) */}
                  <div className={`flex items-center gap-1 bg-black/50 rounded-xl border transition-all duration-300 overflow-hidden ${customTipStr !== '' ? 'border-purple-400 shadow-[0_0_15px_rgba(168,85,247,0.3)] bg-purple-900/20' : 'border-white/5 hover:border-white/20'}`}>
                    <span className="text-slate-500 font-mono text-xs pl-3 font-bold">₹</span>
                    <input 
                      type="number"
                      value={customTipStr}
                      placeholder="Custom"
                      onChange={(e) => {
                        setCustomTipStr(e.target.value);
                        setTip(Math.round(Number(e.target.value)) || 0);
                      }}
                      className="premium-input text-white font-mono font-bold text-xs py-3 w-full pr-2"
                    />
                  </div>
                </div>

                <div className="mt-5 pt-5 border-t border-white/5 flex justify-between items-center">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Amount</span>
                  <span className="text-xl font-black text-white font-mono">₹{grandTotal}</span>
                </div>
              </div>

            </div>

            {/* RIGHT COLUMN (Roster & Strategy) */}
            <div className="lg:col-span-7 flex flex-col gap-5">
              
              {/* CELL 3: SPLIT METHOD */}
              <div className="bento-cell p-6 animate-bento" style={{ animationDelay: '0.3s' }}>
                <div className="flex justify-between items-center mb-5">
                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Split Method</span>
                  {mode === 'custom' && (
                    <span className={`text-[10px] font-mono font-bold px-2 py-1 rounded ${unequalAssigned === grandTotal ? 'bg-emerald-500/20 text-emerald-400' : 'bg-orange-500/20 text-orange-400'}`}>
                      Assigned: ₹{unequalAssigned}/₹{grandTotal}
                    </span>
                  )}
                </div>
                
                <div className="bg-black/50 p-1.5 rounded-2xl flex border border-white/5">
                  <button onClick={() => setMode('equal')} className={`flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 transition-all ${mode === 'equal' ? 'bg-white/10 text-white shadow-md' : 'text-slate-500 hover:text-slate-300'}`}>
                    <UsersIcon /> Equal
                  </button>
                  <button onClick={() => setMode('custom')} className={`flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 transition-all ${mode === 'custom' ? 'bg-white/10 text-white shadow-md' : 'text-slate-500 hover:text-slate-300'}`}>
                    <SlidersIcon /> Custom
                  </button>
                </div>
              </div>

              {/* CELL 4: NUMBER OF PERSONS */}
              <div className="bento-cell p-6 flex-1 flex flex-col animate-bento" style={{ animationDelay: '0.4s' }}>
                <div className="flex justify-between items-center mb-6">
                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Number of Persons</span>
                  <span className="text-[10px] font-mono text-purple-400/50">PERSONS: {people.length}</span>
                </div>

                <div className="flex flex-col gap-3 custom-scroll overflow-y-auto max-h-[350px] pr-2">
                  {people.map((person, index) => (
                    <div key={person.id} className="group relative bg-black/30 p-3 pl-4 rounded-2xl border border-white/5 flex items-center gap-4 transition-all hover:border-white/10">
                      
                      <div className="w-8 h-8 shrink-0 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xs font-bold text-slate-300">
                        {index + 1}
                      </div>

                      <input 
                        value={person.name}
                        onChange={(e) => {
                          const newP = [...people];
                          newP[index].name = e.target.value;
                          setPeople(newP);
                        }}
                        placeholder={`Person ${index+1}`}
                        className="premium-input text-white font-semibold text-lg"
                      />

                      {mode === 'custom' && (
                        <div className="flex items-center gap-1 bg-black/50 px-3 py-2 rounded-xl border border-white/5">
                          <span className="text-slate-500 font-mono text-sm">₹</span>
                          <input 
                            type="number"
                            value={person.amount}
                            onChange={(e) => {
                              const newP = [...people];
                              newP[index].amount = Math.round(Number(e.target.value)) || '';
                              setPeople(newP);
                            }}
                            placeholder="0"
                            className="premium-input text-white font-mono font-bold text-right w-16"
                          />
                        </div>
                      )}
                      
                      {people.length > 2 && (
                        <button onClick={() => removePerson(person.id)} className="absolute -right-2 -top-2 w-6 h-6 bg-red-500/20 text-red-400 rounded-full opacity-0 group-hover:opacity-100 transition-opacity text-xs flex items-center justify-center border border-red-500/30">✕</button>
                      )}
                    </div>
                  ))}
                </div>

                <button onClick={addPerson} className="mt-4 w-full py-4 rounded-2xl border border-dashed border-white/10 text-slate-500 text-xs font-bold uppercase tracking-[0.2em] hover:text-white hover:border-white/30 hover:bg-white/5 transition-all">
                  + Add Person
                </button>
              </div>

            </div>
          </div>

          {/* ACTION: CALCULATE BUTTON */}
          <button 
            onClick={handleCalculate}
            disabled={bAmount === 0}
            className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] transition-all duration-500 animate-bento ${bAmount === 0 ? 'bg-white/5 text-slate-600 border border-white/5 cursor-not-allowed' : 'bg-white text-black hover:bg-slate-200 shadow-[0_0_30px_rgba(255,255,255,0.3)] hover:shadow-[0_0_50px_rgba(255,255,255,0.5)]'}`}
            style={{ animationDelay: '0.5s' }}
          >
            Calculate Bill
          </button>

        </div>

        {/* --- SUMMARY / DIGITAL RECEIPT MODAL --- */}
        {calculatedResult && (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => setCalculatedResult(null)}></div>
            
            <div className="bg-zinc-950 border border-emerald-500/30 rounded-[2rem] w-full max-w-md p-8 relative z-10 animate-receipt shadow-[0_0_80px_rgba(16,185,129,0.15)] flex flex-col">
              <button onClick={() => setCalculatedResult(null)} className="absolute top-6 right-6 text-slate-500 hover:text-white">✕</button>
              
              <div className="text-center mb-8">
                <div className="text-[10px] text-emerald-500 font-bold tracking-[0.3em] uppercase mb-2 flex items-center justify-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Split Summary
                </div>
                <div className="text-5xl font-black text-white tracking-tighter">₹{calculatedResult.grandTotal}</div>
              </div>

              <div className="w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent mb-6"></div>

              <div className="flex flex-col gap-4 custom-scroll max-h-[40vh] overflow-y-auto mb-8">
                {calculatedResult.split.map((p, i) => (
                  <div key={i} className="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <span className="text-sm font-semibold text-slate-300">{p.name || `Person ${i+1}`}</span>
                    <span className="text-xl font-mono font-bold text-emerald-400">₹{p.finalShare}</span>
                  </div>
                ))}
              </div>

              {/* Share & Done Buttons */}
              <div className="flex gap-4 mt-auto">
                <button 
                  onClick={handleShare}
                  className="flex-1 py-4 bg-white/5 border border-white/10 text-white font-bold text-xs uppercase tracking-[0.2em] rounded-xl hover:bg-white/10 transition-colors flex justify-center items-center gap-2"
                >
                  <ShareIcon /> Share
                </button>
                <button 
                  onClick={() => setCalculatedResult(null)} 
                  className="flex-1 py-4 bg-emerald-500 text-black font-bold text-xs uppercase tracking-[0.2em] rounded-xl hover:bg-emerald-400 transition-colors"
                >
                  Done
                </button>
              </div>
            </div>
          </div>
        )}

        {/* --- HISTORY MODAL --- */}
        {showHistory && (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => setShowHistory(false)}></div>
            <div className="bg-zinc-950 border border-white/10 w-full max-w-md rounded-[2rem] p-8 relative z-10 animate-receipt shadow-2xl">
              <div className="flex justify-between items-center mb-8">
                <h3 className="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2"><HistoryIcon/> History</h3>
                <button onClick={() => setShowHistory(false)} className="text-slate-500 hover:text-white leading-none">✕</button>
              </div>
              
              <div className="flex flex-col gap-3 overflow-y-auto max-h-[60vh] pr-2 custom-scroll">
                {history.length === 0 ? (
                  <p className="text-slate-500 text-xs text-center py-10 uppercase tracking-widest">No History Available</p>
                ) : (
                  history.map(item => (
                    <div key={item.id} className="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                      <div>
                        <div className="text-white font-mono font-bold text-xl mb-1">₹{item.grandTotal}</div>
                        <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest flex items-center gap-2">
                          <span className="text-purple-400">{item.mode}</span> 
                          • {item.split.length} Persons 
                          • {item.date}
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        )}

      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
